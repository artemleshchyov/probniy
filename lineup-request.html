<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Предматчевая заявка — Федерация футзала</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .form-container {
      max-width: 600px;
      margin: 2rem auto;
      background: var(--card-bg);
      padding: 2rem;
      border-radius: 12px;
      box-shadow: var(--shadow);
    }
    .form-group {
      margin-bottom: 1.2rem;
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.3rem;
    }
    select, textarea {
      width: 100%;
      padding: 0.7rem;
      border: 1px solid var(--table-border);
      border-radius: 6px;
      background: var(--bg-color);
      color: var(--text-color);
      font-size: 1rem;
    }
    button[type="submit"] {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 0.8rem 1.5rem;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: bold;
    }
    .hidden {
      display: none;
    }
    .radio-group {
      display: flex;
      gap: 2rem;
      margin-top: 0.3rem;
    }
    .radio-group label {
      font-weight: normal;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    .note {
      font-size: 0.9rem;
      color: #888;
      margin-top: 0.2rem;
    }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <span class="logo">⚽ ФФС</span>
      <button id="theme-toggle" title="Переключить тему">🌓</button>
    </div>
    <nav>
      <a href="index.html">← На главную</a>
    </nav>
  </header>

  <main>
    <div class="form-container">
      <h2>Заявка на матч (состав)</h2>
      <p>Выберите ближайший матч и укажите состав команды.</p>

      <form name="lineup-request" method="POST" data-netlify="true" netlify-honeypot="bot-field" data-netlify-recaptcha="true">
        <!-- Антиспам -->
        <div class="hidden">
          <label>Не заполняйте: <input name="bot-field"></label>
        </div>

        <!-- Скрытые поля, заполняются через JS -->
        <input type="hidden" name="matchId" id="matchId">
        <input type="hidden" name="matchDate" id="matchDate">
        <input type="hidden" name="matchTime" id="matchTime">
        <input type="hidden" name="homeTeam" id="homeTeam">
        <input type="hidden" name="awayTeam" id="awayTeam">
        <input type="hidden" name="selectedTeam" id="selectedTeam">

        <div class="form-group">
          <label for="matchSelect">Выберите матч</label>
          <select id="matchSelect" required>
            <option value="">-- Загрузка... --</option>
          </select>
          <div class="note" id="matchInfo"></div>
        </div>

        <div class="form-group" id="teamChoice" style="display:none;">
          <label>Вы подаёте заявку за команду:</label>
          <div class="radio-group">
            <label><input type="radio" name="teamSide" value="home" required> <span id="homeTeamLabel"></span></label>
            <label><input type="radio" name="teamSide" value="away"> <span id="awayTeamLabel"></span></label>
          </div>
        </div>

        <div class="form-group" id="lineupGroup" style="display:none;">
          <label for="lineup">Состав (через запятую)</label>
          <textarea id="lineup" name="lineup" rows="3" placeholder="Иван Петров, Сергей Смирнов..."></textarea>
        </div>

        <div id="submitGroup" style="display:none;">
          <button type="submit">Отправить заявку</button>
        </div>
      </form>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 Федерация футзала</p>
  </footer>

  <script>
    (function() {
      // Тема
      const toggle = document.getElementById('theme-toggle');
      const saved = localStorage.getItem('theme');
      if (saved === 'dark') document.body.classList.add('dark-theme');
      if (toggle) {
        toggle.addEventListener('click', () => {
          document.body.classList.toggle('dark-theme');
          localStorage.setItem('theme', document.body.classList.contains('dark-theme') ? 'dark' : 'light');
        });
      }

      // Загружаем data.json
      fetch('data.json')
        .then(res => res.json())
        .then(data => {
          const upcoming = data.matches.filter(m => m.status === 'upcoming');
          const select = document.getElementById('matchSelect');
          
          if (!upcoming.length) {
            select.innerHTML = '<option value="">Нет предстоящих матчей</option>';
            return;
          }

          // Заполняем выпадающий список
          select.innerHTML = '<option value="">-- Выберите матч --</option>';
          upcoming.forEach(m => {
            const option = document.createElement('option');
            option.value = m.id;
            option.textContent = `${m.date} ${m.time} — ${m.homeTeam} vs ${m.awayTeam}`;
            option.dataset.date = m.date;
            option.dataset.time = m.time;
            option.dataset.home = m.homeTeam;
            option.dataset.away = m.awayTeam;
            select.appendChild(option);
          });

          // Обработчик выбора матча
          select.addEventListener('change', function() {
            const selected = this.options[this.selectedIndex];
            if (!selected.value) {
              hideTeamAndLineup();
              return;
            }

            // Заполняем скрытые поля
            document.getElementById('matchId').value = selected.value;
            document.getElementById('matchDate').value = selected.dataset.date;
            document.getElementById('matchTime').value = selected.dataset.time;
            document.getElementById('homeTeam').value = selected.dataset.home;
            document.getElementById('awayTeam').value = selected.dataset.away;

            // Показываем выбор команды
            document.getElementById('homeTeamLabel').textContent = selected.dataset.home;
            document.getElementById('awayTeamLabel').textContent = selected.dataset.away;
            document.getElementById('teamChoice').style.display = 'block';
            document.getElementById('lineupGroup').style.display = 'block';
            document.getElementById('submitGroup').style.display = 'block';
            document.getElementById('matchInfo').textContent = 
              `Дата: ${selected.dataset.date}, время: ${selected.dataset.time}`;
          });

          // При выборе стороны команды обновляем скрытое поле selectedTeam
          const radios = document.getElementsByName('teamSide');
          radios.forEach(radio => {
            radio.addEventListener('change', function() {
              if (this.value === 'home') {
                document.getElementById('selectedTeam').value = document.getElementById('homeTeam').value;
              } else {
                document.getElementById('selectedTeam').value = document.getElementById('awayTeam').value;
              }
            });
          });
        })
        .catch(() => {
          document.getElementById('matchSelect').innerHTML = '<option value="">Ошибка загрузки данных</option>';
        });

      function hideTeamAndLineup() {
        document.getElementById('teamChoice').style.display = 'none';
        document.getElementById('lineupGroup').style.display = 'none';
        document.getElementById('submitGroup').style.display = 'none';
        document.getElementById('matchInfo').textContent = '';
      }
    })();
  </script>
</body>
</html>
